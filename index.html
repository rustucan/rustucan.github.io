<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Hızlı Araçlar - Görsel Boyutlandırıcı</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #f4f4f4; }
        .box { background: white; padding: 20px; border-radius: 10px; display: inline-block; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        button { background: #28a745; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="box">
        <h1>Ücretsiz Görsel Boyutlandırıcı</h1>
        <p>Dosyanı seç ve anında optimize et!</p>
        <input type="file" id="upload" accept="image/*"><br><br>
        <button onclick="alert('Bu özellik bir sonraki güncellemede aktif olacak!')">Boyutlandır</button>
    </div>
</body>
</html>
