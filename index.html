<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RustuTools PRO | Gamer Connect</title>
    <script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --primary: #00ff41; --bg: #0a0a0a; --panel: #161616; --text: #e0e0e0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        /* Header & Share */
        .header { background: var(--panel); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); }
        .share-box { display: flex; gap: 10px; }
        
        /* Main Layout */
        .main { display: flex; flex: 1; overflow: hidden; padding: 10px; gap: 10px; }
        .controls { flex: 1; background: var(--panel); border-radius: 15px; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .chat { flex: 1.5; background: var(--panel); border-radius: 15px; display: flex; flex-direction: column; }
        
        /* Chat Area */
        #messages { flex: 1; overflow-y: auto; padding: 15px; border-bottom: 1px solid #333; font-size: 14px; }
        .chat-input { display: flex; padding: 10px; }
        input[type="text"] { flex: 1; background: #222; border: none; color: white; padding: 10px; border-radius: 5px; }
        
        /* Buttons & Sliders */
        .btn { cursor: pointer; border: none; border-radius: 5px; padding: 10px; font-weight: bold; transition: 0.3s; }
        .btn-green { background: var(--primary); color: black; }
        .btn-red { background: #ff4b2b; color: white; }
        .slider-box { display: flex; flex-direction: column; gap: 5px; }
        input[type="range"] { accent-color: var(--primary); }
        
        /* QR Overlay */
        #qr-overlay { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border-radius: 10px; z-index: 100; }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin:0; color:var(--primary);">🛡️ RUSTU PRO</h2>
    <div class="share-box">
        <button class="btn btn-green" onclick="copyLink()">🔗 Linki Kopyala</button>
        <button class="btn btn-green" onclick="toggleQR()">📱 QR</button>
    </div>
</div>

<div class="main">
    <div class="controls">
        <div class="slider-box">
            <label>Kendi ID'ni Belirle:</label>
            <input type="text" id="myCustomId" placeholder="Örn: rustu123">
            <button class="btn btn-green" onclick="setMyId()">ID Kaydet</button>
        </div>
        
        <hr style="border:0.5px solid #333; width:100%;">

        <div class="slider-box">
            <label>🎤 Mikrofon Sesi: <span id="inVal">1.0</span></label>
            <input type="range" id="inGain" min="0" max="3" step="0.1" value="1">
            <button id="muteMic" class="btn btn-green" onclick="toggleMic()">🎤 Mic: AÇIK</button>
        </div>

        <div class="slider-box">
            <label>🔊 Arkadaşının Sesi: <span id="outVal">1.0</span></label>
            <input type="range" id="outGain" min="0" max="3" step="0.1" value="1">
            <button id="muteSpk" class="btn btn-green" onclick="toggleSpk()">🔊 Hoparlör: AÇIK</button>
        </div>

        <div class="slider-box">
            <input type="text" id="destId" placeholder="Arkadaşının ID'si">
            <button class="btn btn-green" onclick="startCall()">SESE VE SOHBETE BAĞLAN</button>
        </div>
        <div id="status" style="font-size:12px; color:var(--primary);">Durum: Bekleniyor...</div>
    </div>

    <div class="chat">
        <div id="messages"></div>
        <div class="chat-input">
            <input type="text" id="chatMsg" placeholder="Mesaj gönder..." onkeypress="checkEnter(event)">
            <button class="btn btn-green" style="margin-left:5px;" onclick="sendChat()">Gönder</button>
        </div>
    </div>
</div>

<div id="qr-overlay" onclick="this.style.display='none'">
    <div id="qrcode"></div>
    <p style="color:black; text-align:center; margin-top:10px;">Kapatmak için tıkla</p>
</div>

<audio id="remoteAudio" autoplay></audio>

<script>
    let peer, conn, call, myStream, audioCtx, inNode, outNode;
    let micActive = true, spkActive = true;

    function setMyId() {
        const customId = document.getElementById('myCustomId').value;
        if(!customId) return alert("Bir ID yaz!");
        
        peer = new Peer(customId, {
            config: {'iceServers': [{ url: 'stun:stun.l.google.com:19302' }]}
        });

        peer.on('open', (id) => {
            document.getElementById('status').innerText = "ID Hazır: " + id;
        });

        peer.on('connection', (c) => { conn = c; setupChat(); });
        peer.on('call', (c) => {
            navigator.mediaDevices.getUserMedia({audio:true}).then(s => {
                myStream = s;
                c.answer(s);
                handleCall(c);
            });
        });
    }

    async function startCall() {
        const id = document.getElementById('destId').value;
        myStream = await navigator.mediaDevices.getUserMedia({audio:true});
        conn = peer.connect(id);
        setupChat();
        call = peer.call(id, myStream);
        handleCall(call);
    }

    function handleCall(c) {
        c.on('stream', (rs) => {
            audioCtx = new AudioContext();
            const src = audioCtx.createMediaStreamSource(rs);
            outNode = audioCtx.createGain();
            src.connect(outNode);
            outNode.connect(audioCtx.destination);
            document.getElementById('status').innerText = "BAĞLANDI!";
        });
    }

    // Ses Kontrolleri
    document.getElementById('inGain').oninput = function() {
        document.getElementById('inVal').innerText = this.value;
        // Mikrofon kazancı normalde giden stream'e uygulanır
    };
    document.getElementById('outGain').oninput = function() {
        if(outNode) outNode.gain.value = this.value;
        document.getElementById('outVal').innerText = this.value;
    };

    function toggleMic() {
        micActive = !micActive;
        myStream.getAudioTracks()[0].enabled = micActive;
        document.getElementById('muteMic').innerText = micActive ? "🎤 Mic: AÇIK" : "🎤 Mic: KAPALI";
        document.getElementById('muteMic').className = micActive ? "btn btn-green" : "btn btn-red";
    }

    function toggleSpk() {
        spkActive = !spkActive;
        const ra = document.getElementById('remoteAudio');
        ra.muted = !spkActive;
        document.getElementById('muteSpk').innerText = spkActive ? "🔊 Hoparlör: AÇIK" : "🔊 Hoparlör: KAPALI";
        document.getElementById('muteSpk').className = spkActive ? "btn btn-green" : "btn btn-red";
    }

    // Sohbet Fonksiyonları
    function setupChat() {
        conn.on('data', data => { addMsg("Arkadaşın: " + data); });
    }
    function sendChat() {
        const m = document.getElementById('chatMsg').value;
        if(conn && m) { conn.send(m); addMsg("Sen: " + m); document.getElementById('chatMsg').value = ""; }
    }
    function addMsg(t) { 
        const div = document.getElementById('messages');
        div.innerHTML += `<div>${t}</div>`;
        div.scrollTop = div.scrollHeight;
    }
    function checkEnter(e) { if(e.key === 'Enter') sendChat(); }

    // Paylaşım
    function copyLink() {
        navigator.clipboard.writeText(window.location.href);
        alert("Link kopyalandı!");
    }
    function toggleQR() {
        const qrdiv = document.getElementById('qrcode');
        qrdiv.innerHTML = "";
        new QRCode(qrdiv, window.location.href);
        document.getElementById('qr-overlay').style.display = 'block';
    }
</script>
</body>
</html>
