<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RustuConnect | Pro Mobile & Voice</title>
    <script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --bg: #0f172a; --panel: #1e293b; --primary: #a855f7; --secondary: #3b82f6; --text: #f8fafc; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Header */
        .header { background: var(--panel); padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); z-index: 10; }
        .logo { font-weight: 800; font-size: 18px; color: var(--primary); }
        
        /* Layout */
        .main { display: flex; flex: 1; overflow: hidden; position: relative; }
        
        /* Sidebar (Kontroller) */
        .sidebar { 
            width: 280px; background: var(--panel); padding: 15px; 
            display: flex; flex-direction: column; gap: 15px; 
            transition: all 0.3s ease; z-index: 5;
            border-right: 1px solid #334155;
        }
        .sidebar.mobile-hide { transform: translateX(-100%); position: absolute; height: 100%; }

        /* Chat Alanı */
        .chat-area { flex: 1; display: flex; flex-direction: column; background: #0b0f1a; transition: all 0.3s ease; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        
        /* Mesaj Balonları */
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 20px; font-size: 15px; line-height: 1.4; word-wrap: break-word; }
        .msg-me { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 4px; }
        .msg-friend { align-self: flex-start; background: #334155; color: white; border-bottom-left-radius: 4px; }

        /* Alt Kısım (Input) */
        .chat-footer { padding: 10px; background: var(--panel); display: flex; gap: 8px; border-top: 1px solid #334155; }
        input[type="text"] { flex: 1; background: #0f172a; border: 1px solid #475569; color: white; padding: 12px; border-radius: 25px; outline: none; }

        /* Butonlar */
        .btn { border: none; border-radius: 25px; padding: 10px 15px; font-weight: 600; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-mode { background: var(--secondary); color: white; font-size: 12px; }
        .btn-danger { background: #ef4444; color: white; }
        
        /* Slider Kartları */
        .card { background: #1e293b; border: 1px solid #475569; padding: 12px; border-radius: 12px; }
        .card label { font-size: 11px; text-transform: uppercase; color: #94a3b8; display: block; margin-bottom: 5px; }

        /* QR Overlay */
        #qr-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; flex-direction: column; align-items: center; justify-content: center; }
        #qrcode { background: white; padding: 15px; border-radius: 10px; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">RUSTU V4</div>
    <div style="display: flex; gap: 5px;">
        <button class="btn btn-mode" onclick="toggleMobileMode()">📱 Telefon Modu</button>
        <button class="btn btn-mode" onclick="openQR()">QR</button>
    </div>
</div>

<div class="main">
    <div class="sidebar" id="sidebar">
        <div class="card">
            <label>1. Profilini Aç</label>
            <input type="text" id="myId" placeholder="ID'niz (örn: rst1)">
            <button class="btn btn-primary" style="width: 100%;" onclick="initPeer()">Sistemi Başlat</button>
            <div id="status" style="font-size: 11px; margin-top: 5px; color: #fbbf24;">Durum: Bekleniyor</div>
        </div>

        <div class="card">
            <label>2. Arkadaşına Bağlan</label>
            <input type="text" id="targetId" placeholder="Arkadaşının ID'si">
            <button class="btn btn-primary" style="width: 100%; background: #10b981;" onclick="startVoiceChat()">🎤 SESE BAĞLAN</button>
        </div>

        <div class="card">
            <label>Ses Ayarları</label>
            <div style="margin-top:10px;">
                <label style="text-transform:none;">Çıkış Sesi: <span id="outV">1.0</span></label>
                <input type="range" id="outG" min="0" max="4" step="0.1" value="1" style="width:100%;">
            </div>
            <button id="micBtn" class="btn btn-primary" onclick="toggleMic()" style="width:100%; margin-top:10px;">🎤 Mikrofon: AÇIK</button>
        </div>
    </div>

    <div class="chat-area">
        <div id="messages">
            <div class="msg msg-friend">Hoş geldin! Üstteki "Telefon Modu" butonuna basarak ekranı genişletebilirsin.</div>
        </div>
        <div class="chat-footer">
            <input type="text" id="chatIn" placeholder="Mesaj yaz..." onkeypress="if(event.key==='Enter') sendMsg()">
            <button class="btn btn-primary" onclick="sendMsg()">Gönder</button>
        </div>
    </div>
</div>

<div id="qr-overlay" onclick="this.style.display='none'">
    <div id="qrcode"></div>
    <p style="margin-top:10px; color:white;">Kapatmak için dokun</p>
</div>

<audio id="remoteAudio" autoplay></audio>

<script>
    let peer, conn, myStream, audioCtx, outGainNode;
    let isMic = true;

    function toggleMobileMode() {
        const sb = document.getElementById('sidebar');
        sb.classList.toggle('mobile-hide');
    }

    function initPeer() {
        const id = document.getElementById('myId').value;
        if(!id) return alert("Önce ID belirle!");
        peer = new Peer(id, { config: {'iceServers': [{ url: 'stun:stun.l.google.com:19302' }]} });
        peer.on('open', (id) => {
            document.getElementById('status').innerText = "✅ Çevrimiçi: " + id;
            document.getElementById('status').style.color = "#10b981";
        });
        peer.on('connection', c => { conn = c; setupChat(); });
        peer.on('call', call => {
            navigator.mediaDevices.getUserMedia({audio: true}).then(s => {
                myStream = s; call.answer(s); handleStream(call);
            });
        });
    }

    async function startVoiceChat() {
        const tid = document.getElementById('targetId').value;
        if(!tid) return alert("Arkadaşının ID'sini yaz!");
        myStream = await navigator.mediaDevices.getUserMedia({audio: true});
        conn = peer.connect(tid);
        setupChat();
        const call = peer.call(tid, myStream);
        handleStream(call);
    }

    function handleStream(call) {
        call.on('stream', rs => {
            audioCtx = new AudioContext();
            const source = audioCtx.createMediaStreamSource(rs);
            outGainNode = audioCtx.createGain();
            source.connect(outGainNode);
            outGainNode.connect(audioCtx.destination);
            addMsg("Sistem", "Sesli sohbet başladı!", "friend");
            // Bağlanınca telefon moduna otomatik geçebilir
            document.getElementById('sidebar').classList.add('mobile-hide');
        });
    }

    function setupChat() { conn.on('data', d => addMsg("Arkadaşın", d, "friend")); }
    
    function sendMsg() {
        const m = document.getElementById('chatIn').value;
        if(conn && m) { conn.send(m); addMsg("Sen", m, "me"); document.getElementById('chatIn').value = ""; }
    }

    function addMsg(user, text, type) {
        const div = document.getElementById('messages');
        const mDiv = document.createElement('div');
        mDiv.className = `msg msg-${type}`;
        mDiv.innerText = text;
        div.appendChild(mDiv);
        div.scrollTop = div.scrollHeight;
    }

    function toggleMic() {
        isMic = !isMic;
        myStream.getAudioTracks()[0].enabled = isMic;
        document.getElementById('micBtn').innerText = isMic ? "🎤 Mikrofon: AÇIK" : "🎤 Mikrofon: KAPALI";
        document.getElementById('micBtn').style.background = isMic ? "" : "#ef4444";
    }

    document.getElementById('outG').oninput = function() { 
        if(outGainNode) outGainNode.gain.value = this.value; 
        document.getElementById('outV').innerText = this.value; 
    };

    function openQR() {
        document.getElementById('qrcode').innerHTML = "";
        new QRCode(document.getElementById('qrcode'), window.location.href);
        document.getElementById('qr-overlay').style.display = 'flex';
    }
</script>
</body>
</html>
