<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RustuTools | Ultra Chat & Voice</title>
    <script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --bg: #0b0e14; --panel: #151921; --primary: #8b5cf6; --secondary: #3b82f6; --text: #f3f4f6; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Üst Bar */
        .header { background: var(--panel); padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2d3748; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .logo { font-size: 20px; font-weight: 800; background: linear-gradient(to right, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* Ana Gövde */
        .main { display: flex; flex: 1; padding: 15px; gap: 15px; overflow: hidden; }
        
        /* Sol Panel: Kontroller */
        .sidebar { width: 320px; background: var(--panel); border-radius: 20px; padding: 20px; display: flex; flex-direction: column; gap: 20px; box-shadow: 0 10px 15px rgba(0,0,0,0.2); }
        .card { background: #1e2532; padding: 15px; border-radius: 12px; border: 1px solid #2d3748; }
        label { display: block; font-size: 12px; color: #9ca3af; margin-bottom: 8px; font-weight: 600; text-transform: uppercase; }
        input { width: 100%; background: #0b0e14; border: 1px solid #374151; color: white; padding: 10px; border-radius: 8px; margin-bottom: 10px; box-sizing: border-box; }
        
        /* Butonlar */
        .btn { cursor: pointer; border: none; border-radius: 8px; padding: 10px 15px; font-weight: bold; transition: all 0.2s; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-p { background: var(--primary); color: white; }
        .btn-p:hover { filter: brightness(1.2); transform: translateY(-1px); }
        .btn-s { background: #374151; color: white; }
        .btn-danger { background: #ef4444; color: white; }

        /* Sağ Panel: Chat */
        .chat-area { flex: 1; background: var(--panel); border-radius: 20px; display: flex; flex-direction: column; box-shadow: 0 10px 15px rgba(0,0,0,0.2); overflow: hidden; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; background-image: radial-gradient(#2d3748 0.5px, transparent 0.5px); background-size: 20px 20px; }
        
        /* Mesaj Balonları */
        .msg { max-width: 70%; padding: 10px 15px; border-radius: 18px; font-size: 14px; line-height: 1.4; position: relative; }
        .msg-me { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 4px; }
        .msg-friend { align-self: flex-start; background: #374151; color: white; border-bottom-left-radius: 4px; }
        
        .chat-footer { padding: 15px; background: #1e2532; display: flex; gap: 10px; }
        
        /* QR & Link Box */
        #qr-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        #qrcode { background: white; padding: 20px; border-radius: 15px; }

        /* Kaydırıcılar */
        input[type="range"] { height: 5px; border-radius: 5px; background: #374151; outline: none; -webkit-appearance: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 15px; height: 15px; background: var(--secondary); border-radius: 50%; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">RUSTU CONNECT v3</div>
    <div style="display: flex; gap: 10px;">
        <button class="btn btn-s" onclick="copyLink()" style="width: auto;">🔗 Link</button>
        <button class="btn btn-s" onclick="openQR()" style="width: auto;">📱 QR</button>
    </div>
</div>

<div class="main">
    <div class="sidebar">
        <div class="card">
            <label>Profilim</label>
            <input type="text" id="myId" placeholder="Örn: rustu_pro">
            <button class="btn btn-p" onclick="initMyPeer()">Sisteme Giriş Yap</button>
            <div id="status" style="font-size: 11px; margin-top: 8px; color: #10b981;">🔴 Bağlı Değil</div>
        </div>

        <div class="card">
            <label>Ses Kontrolleri</label>
            <div style="margin-bottom:15px;">
                <label style="text-transform:none;">🎤 Mikrofon Gücü (<span id="inV">1.0</span>)</label>
                <input type="range" id="inG" min="0" max="4" step="0.1" value="1">
                <button id="micBtn" class="btn btn-p" onclick="toggleMic()" style="margin-top:5px;">🎤 Mic: AÇIK</button>
            </div>
            <div>
                <label style="text-transform:none;">🔊 Arkadaşın Sesi (<span id="outV">1.0</span>)</label>
                <input type="range" id="outG" min="0" max="4" step="0.1" value="1">
                <button id="spkBtn" class="btn btn-p" onclick="toggleSpk()" style="margin-top:5px;">🔊 Hoparlör: AÇIK</button>
            </div>
        </div>

        <div class="card">
            <label>Bağlantı</label>
            <input type="text" id="targetId" placeholder="Arkadaşının ID'si">
            <button class="btn btn-p" onclick="callFriend()">📞 ARA VE BAĞLAN</button>
        </div>
    </div>

    <div class="chat-area">
        <div id="messages">
            <div class="msg msg-friend">Hoş geldin! Önce giriş yap, sonra ID paylaşarak konuşmaya başla.</div>
        </div>
        <div class="chat-footer">
            <input type="text" id="chatIn" placeholder="Mesajınızı yazın..." onkeypress="if(event.key==='Enter') sendMsg()">
            <button class="btn btn-p" onclick="sendMsg()" style="width: 80px;">Gönder</button>
        </div>
    </div>
</div>

<div id="qr-overlay" style="display:none;" onclick="this.style.display='none'">
    <div id="qrcode"></div>
    <p style="margin-top:15px;">Kapatmak için ekrana dokun</p>
</div>

<audio id="remoteAudio" autoplay></audio>

<script>
    let peer, conn, myStream, audioCtx, outGainNode;
    let isMic = true, isSpk = true;

    function initMyPeer() {
        const id = document.getElementById('myId').value;
        if(!id) return alert("Lütfen bir ID belirle!");

        peer = new Peer(id, {
            config: {
                'iceServers': [
                    { url: 'stun:stun.l.google.com:19302' },
                    { url: 'stun:stun1.l.google.com:19302' },
                    { url: 'stun:stun2.l.google.com:19302' }
                ]
            }
        });

        peer.on('open', (id) => {
            document.getElementById('status').innerText = "🟢 Çevrimiçi: " + id;
            document.getElementById('status').style.color = "#10b981";
        });

        peer.on('connection', c => { conn = c; setupChat(); });

        peer.on('call', call => {
            navigator.mediaDevices.getUserMedia({audio: {echoCancellation: true, noiseSuppression: true}}).then(s => {
                myStream = s;
                call.answer(s);
                handleStream(call);
            });
        });
    }

    async function callFriend() {
        const tid = document.getElementById('targetId').value;
        myStream = await navigator.mediaDevices.getUserMedia({audio: true});
        conn = peer.connect(tid);
        setupChat();
        const call = peer.call(tid, myStream);
        handleStream(call);
    }

    function handleStream(call) {
        call.on('stream', rs => {
            audioCtx = new AudioContext();
            const source = audioCtx.createMediaStreamSource(rs);
            outGainNode = audioCtx.createGain();
            source.connect(outGainNode);
            outGainNode.connect(audioCtx.destination);
            addMsg("Sohbet", "Sistem: Ses bağlantısı kuruldu!", "friend");
        });
    }

    // Ses Ayarları
    document.getElementById('inG').oninput = function() { document.getElementById('inV').innerText = this.value; };
    document.getElementById('outG').oninput = function() { 
        if(outGainNode) outGainNode.gain.value = this.value; 
        document.getElementById('outV').innerText = this.value; 
    };

    function toggleMic() {
        isMic = !isMic;
        myStream.getAudioTracks()[0].enabled = isMic;
        document.getElementById('micBtn').innerText = isMic ? "🎤 Mic: AÇIK" : "🎤 Mic: KAPALI";
        document.getElementById('micBtn').className = isMic ? "btn btn-p" : "btn btn-danger";
    }

    function toggleSpk() {
        isSpk = !isSpk;
        const ra = document.getElementById('remoteAudio');
        ra.muted = !isSpk;
        document.getElementById('spkBtn').innerText = isSpk ? "🔊 Hoparlör: AÇIK" : "🔊 Hoparlör: KAPALI";
        document.getElementById('spkBtn').className = isSpk ? "btn btn-p" : "btn btn-danger";
    }

    // Chat
    function setupChat() { conn.on('data', d => addMsg("Arkadaşın", d, "friend")); }
    function sendMsg() {
        const m = document.getElementById('chatIn').value;
        if(conn && m) { conn.send(m); addMsg("Sen", m, "me"); document.getElementById('chatIn').value = ""; }
    }
    function addMsg(user, text, type) {
        const div = document.getElementById('messages');
        const mDiv = document.createElement('div');
        mDiv.className = `msg msg-${type}`;
        mDiv.innerText = text;
        div.appendChild(mDiv);
        div.scrollTop = div.scrollHeight;
    }

    // Paylaşım
    function copyLink() { navigator.clipboard.writeText(window.location.href); alert("Link kopyalandı!"); }
    function openQR() {
        document.getElementById('qrcode').innerHTML = "";
        new QRCode(document.getElementById('qrcode'), window.location.href);
        document.getElementById('qr-overlay').style.display = 'flex';
    }
</script>
</body>
</html>
