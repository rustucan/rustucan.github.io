<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RustuTools | Ücretsiz Dijital Araçlar</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f8f9fa; margin: 0; padding: 20px; }
        .nav { text-align: center; margin-bottom: 30px; }
        .nav button { padding: 10px 20px; margin: 5px; cursor: pointer; border: none; border-radius: 20px; background: #007bff; color: white; }
        .container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); max-width: 500px; margin: auto; display: none; }
        .active { display: block; }
        h1 { color: #333; font-size: 22px; }
        input, button.action-btn { width: 100%; padding: 12px; margin-top: 15px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        button.action-btn { background: #28a745; color: white; border: none; font-weight: bold; cursor: pointer; }
        #qrcode { margin-top: 20px; display: flex; justify-content: center; }
    </style>
</head>
<body>

    <div class="nav">
        <h1>🛠️ RustuTools</h1>
        <button onclick="showTool('resimTool')">Görsel Sıkıştırıcı</button>
        <button onclick="showTool('qrTool')">QR Kod Oluşturucu</button>
    </div>

    <div id="resimTool" class="container active">
        <h2>🖼️ Görsel Sıkıştırıcı</h2>
        <p>Resmini seç, anında küçült.</p>
        <input type="file" id="upload" accept="image/*">
        <canvas id="canvas" style="display:none;"></canvas>
        <img id="preview" style="width:100%; margin-top:10px; display:none; border-radius:8px;">
        <a id="download" style="display:none;"><button class="action-btn">Resmi İndir</button></a>
    </div>

    <div id="qrTool" class="container">
        <h2>🔗 QR Kod Oluşturucu</h2>
        <p>Link veya metin yaz, QR kodun hazır olsun.</p>
        <input type="text" id="qr-input" placeholder="https://google.com">
        <button class="action-btn" onclick="generateQR()">QR Kod Oluştur</button>
        <div id="qrcode"></div>
    </div>

    <script>
        function showTool(toolId) {
            document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
            document.getElementById(toolId).classList.add('active');
        }

        // QR KOD MANTIĞI
        function generateQR() {
            document.getElementById("qrcode").innerHTML = "";
            const text = document.getElementById("qr-input").value;
            if(text) {
                new QRCode(document.getElementById("qrcode"), text);
            }
        }

        // GÖRSEL SIKIŞTIRICI MANTIĞI
        const upload = document.getElementById('upload');
        upload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.getElementById('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = img.width * 0.5;
                    canvas.height = img.height * 0.5;
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
                    document.getElementById('preview').src = dataUrl;
                    document.getElementById('preview').style.display = 'block';
                    document.getElementById('download').href = dataUrl;
                    document.getElementById('download').download = "kucultulmus.jpg";
                    document.getElementById('download').style.display = 'block';
                }
            };
        });
    </script>
</body>
</html>
